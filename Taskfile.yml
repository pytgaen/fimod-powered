version: "3"

tasks:
  docs:generate:
    desc: Generate documentation from catalog.toml and mold READMEs
    cmds:
      - python3 scripts/build_docs.py

  docs:serve:
    desc: Generate docs and serve locally with live reload
    deps: [docs:generate]
    cmds:
      - uvx zensical serve

  docs:build:
    desc: Generate docs and build static site
    deps: [docs:generate]
    cmds:
      - uvx zensical build

  docs:clean:
    desc: Remove generated docs and site directories
    cmds:
      - rm -rf docs/ site/

  test:all:
    desc: Run fimod tests for every mold
    cmds:
      - |
        set -e
        for mold in dockerfile download gh_latest html_report poetry_migrate skylos_to_gitlab; do
          echo ""
          echo "── $mold ──"
          fimod mold test "molds/$mold/$mold.py" "test-molds/$mold"
        done

[project]
name = "my-package"
version = "1.2.3"
description = "A sample package"
readme = "README.md"
license = "MIT"
dependencies = [
    "flask>=2.0.0,<2.1.0",
    "local-lib",
    "numpy>=0.0.0",
    "requests>=2.28.0,<3.0.0",
]
requires-python = ">=3.10.0,<4.0.0"

[[project.authors]]
name = "John Doe"
email = "john@example.com"

[[project.authors]]
name = "Jane Doe"
email = "jane@example.com"

[project.scripts]
my-cli = "my_package.console:run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "black>=22.0.0,<23.0.0",
    "pytest>=7.0.0,<8.0.0",
]
docs = ["mkdocs>=1.0.0,<2.0.0"]

[[tool.uv.index]]
name = "private"
url = "https://pypi.example.com/simple"

[tool.uv.sources.local-lib]
path = "../libs/local-lib"
editable = "../libs/local-lib"

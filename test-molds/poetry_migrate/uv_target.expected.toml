[project]
name = "my_package"
version = "0.2.0"
description = "Migrate to uv"
dependencies = ["fastapi>=0.100.0,<0.101.0"]
requires-python = ">=3.10.0,<4.0.0"

[[project.authors]]
name = "Dev"
email = "dev@example.com"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = ["pytest>=8.0.0,<9.0.0"]

[[tool.uv.index]]
name = "private"
url = "https://pypi.example.com/simple/"
default = true

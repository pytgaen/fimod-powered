[tool.poetry]
name = "my_package"
version = "1.0.0"
description = "Preserve sources on poetry2 target"
authors = ["Dev <dev@example.com>"]
include = ["my_package/py.typed"]
package-mode = false

[tool.poetry.dependencies]
python = "^3.9"
requests = "^2.28"

[[tool.poetry.source]]
name = "private"
url = "https://pypi.example.com/simple/"
secondary = true

[[tool.poetry.source]]
name = "legacy"
url = "https://legacy.example.com/simple/"
default = true

[project]
name = "my_package"
version = "0.1.0"
description = "Path dependencies for uv"
dependencies = [
    "my-local-lib",
    "requests>=2.28.0,<3.0.0",
]
requires-python = ">=3.9.0,<4.0.0"

[[project.authors]]
name = "Dev"
email = "dev@example.com"

[build-system]

[project]
name = "my_package"
version = "0.1.0"
description = "Editable git dep for uv"
dependencies = ["my-lib"]
requires-python = ">=3.9,<4.0"

[[project.authors]]
name = "Dev"
email = "dev@example.com"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources.my-lib]
git = "https://github.com/org/my-lib.git"
branch = "main"
editable = true

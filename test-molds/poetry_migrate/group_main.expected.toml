[project]
name = "my_package"
version = "0.1.0"
description = "Poetry 1.2+ group.main merges with top-level deps"
dependencies = [
    "requests>=2.28.0,<3.0.0",
    "click>=8.0.0,<9.0.0",
]
requires-python = ">=3.9,<4.0"

[[project.authors]]
name = "Dev"
email = "dev@example.com"

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[dependency-groups]
dev = ["pytest>=7.0.0,<8.0.0"]
